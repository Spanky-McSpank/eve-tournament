name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: type-check
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-key
      EVE_CLIENT_ID: dummy
      EVE_CLIENT_SECRET: dummy
      EVE_CALLBACK_URL: http://localhost:3000/api/auth/eve/callback
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_CHARACTER_IDS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
